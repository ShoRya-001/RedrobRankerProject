compute:
  platform: "Windows laptop"
  cpu_cores: 6
  ram_gb: 16
  python_version: "Python 3.14.2"
  os: "Windows 11"
  gpu_used: false
  network_used_during_ranking: false
  approximate_runtime_seconds: 60
  peak_memory_gb: 1.5

ai_tools_used:
  used_ai_tools: true
  tools:
    - name: "Arena.ai Agent Mode"
      purpose: "Architecture, implementation assistance, debugging, documentation"
      data_shared: "Hackathon docs and small sample candidates only; no private 100K candidate pool required."
  declaration_text: >
    AI tools were used as development assistants. The submitted ranking step is a
    deterministic offline Python implementation and does not call hosted LLM APIs
    during ranking.

methodology_summary: |
  Deterministic offline ranker for the Redrob Senior AI Engineer JD. It combines
  retrieval/ranking evidence, embeddings/vector database skills, applied ML/NLP depth,
  Python production engineering, product-company career evidence, 5-9 year seniority fit,
  location/logistics, and Redrob behavioral signals. It down-weights keyword-stuffers,
  consulting-only histories, inactive candidates, low response rates, long notice periods,
  CV/speech-only AI profiles without IR evidence, and honeypot-style impossible claims.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
